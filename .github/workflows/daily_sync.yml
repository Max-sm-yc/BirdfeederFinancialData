name: Daily Financial Sync

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 6:00 AM UTC every day
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests supabase

      - name: Run sync script
        env:
          WEBHOOK_KEY: ${{ secrets.WEBHOOK_KEY }}
          WEBHOOK_VALUE: ${{ secrets.WEBHOOK_VALUE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_data.py
